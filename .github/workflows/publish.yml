# Publish the signed DagNode DNF repository to https://rpm.dagnode.com/.
#
# This is the ONLY writer of the repository. Projects (tools-agent-tools-restricted and
# siblings) build and SIGN their own RPMs and publish them as GitHub Releases, then notify
# this repo via repository_dispatch (event: publish-rpm). This workflow rebuilds the whole
# repository STATELESSLY from those releases (the source of truth) -- main holds only the
# workflow, docs, and the projects.txt config, never RPMs -- regenerates metadata with
# createrepo_c, detached-signs repomd.xml, and deploys via GitHub Pages. A single concurrency
# group serializes concurrent project releases so two runs never race the deploy.
# See github-org-dag-node/RPM-REPO-HINTS.md for the architecture and setup.
name: Publish RPM repository

on:
  repository_dispatch:
    types: [publish-rpm]
  # Manual rebuild/backfill (also re-runs after editing projects.txt).
  workflow_dispatch:

# Minimal: the build is stateless (no commit -- main is config-only and branch-protected), so
# contents:read to check out the workflow + config; pages/id-token to deploy the built tree.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize every publish so concurrent project releases never race the Pages deploy.
# cancel-in-progress: false -- each release must be published, not dropped.
concurrency:
  group: rpm-repository
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5 -- workflow + projects.txt + README only, no RPMs in git

      - name: Install createrepo_c + rpm + gnupg
        run: sudo apt-get update && sudo apt-get install -y createrepo-c rpm gnupg

      # Rebuild from the projects' releases (the source of truth): for each project in
      # projects.txt, select which release tags to keep (bounded history, see
      # select-releases.py) and download only those releases' signed *.rpm. Stateless and
      # idempotent -- any dispatch just means "something changed, rebuild the whole repo".
      # Public releases, so this repo's own GITHUB_TOKEN reads them; no cross-repo token needed.
      - name: Aggregate signed RPMs from project releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # History bound: keep the latest patch of each of the KEEP_MINORS most-recent MAJOR.MINOR
          # series per project, so the served repo cannot grow without limit. Raise to retain more
          # minors; older ones are evicted (their releases stay on GitHub, just not served here).
          KEEP_MINORS: "10"
        run: |
          set -euo pipefail
          mkdir -p incoming
          # Read the project list without a `... | while read` pipeline, whose subshell would
          # swallow a `set -e` abort from the downloads below.
          mapfile -t projects < <(grep -vE '^\s*(#|$)' projects.txt)
          for proj in "${projects[@]}"; do
            echo "::group::${proj}"
            # List all tags (cheap, metadata only), then let select-releases.py pick the retained
            # set; only those are downloaded. A failed listing must abort rather than rebuild the
            # repo without this project's packages -- the assignment propagates gh's exit status
            # under `set -e`. --limit is generous headroom over the retained count; gh returns
            # newest-first, so the recent minors we keep are always covered.
            all_tags="$(gh release list --repo "${proj}" --limit 1000 --json tagName -q '.[].tagName')"
            kept_tags="$(printf '%s\n' "${all_tags}" | python3 .github/scripts/select-releases.py "${KEEP_MINORS}")"
            for tag in ${kept_tags}; do
              # Only releases that actually carry a *.rpm asset are downloaded. A release with no
              # rpm asset is normal (e.g. a docs-only tag) and skipped; a download that then FAILS
              # is a real error (network/rate-limit) and aborts the run rather than deploying a repo
              # that silently drops that release's already-published packages.
              n_rpm="$(gh release view "${tag}" --repo "${proj}" --json assets \
                        -q '[.assets[].name | select(endswith(".rpm"))] | length')"
              if [ "${n_rpm}" -gt 0 ]; then
                gh release download "${tag}" --repo "${proj}" --pattern '*.rpm' --dir "incoming/${tag}"
              else
                echo "  (${tag}: no RPM assets)"
              fi
            done
            echo "::endgroup::"
          done
          echo "aggregated:"; find incoming -name '*.rpm' | sort

      # Export the served public key from the signing secret (so it always matches the key that
      # signed the packages) and re-verify every aggregated RPM against it. Publish only packages
      # actually signed by the org key: any that fail verification are dropped from incoming/ (with
      # a warning) so the build step below never copies them. The fail-closed guarantee still holds
      # -- unsigned packages never reach _site -- without one stale asset blocking the whole rebuild.
      - name: Export public key + verify packages
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          set -euo pipefail
          [ -n "${GPG_SIGNING_KEY}" ] || { echo "::error::GPG_SIGNING_KEY secret not set"; exit 1; }
          # tmpfs (RAM) keyring: the imported private key never lands on persistent disk, and the
          # ephemeral runner VM (not shared with other jobs) is destroyed at job end.
          GNUPGHOME="$(mktemp -d -p /dev/shm 2>/dev/null || mktemp -d)"; export GNUPGHOME
          printf '%s\n' "${GPG_SIGNING_KEY}" | gpg --batch --quiet --import
          fpr="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1=="fpr"{print $10; exit}')"
          [ -n "${fpr}" ] || { echo "::error::no secret key after import"; exit 1; }
          gpg --batch --armor --export "${fpr}" > RPM-GPG-KEY-dag-node
          rpmdb="$(mktemp -d)"
          rpmkeys --dbpath "${rpmdb}" --import RPM-GPG-KEY-dag-node
          shopt -s nullglob
          published=0; skipped=0
          for r in $(find incoming -name '*.rpm'); do
            # Require a cryptographic signature LINE that validates, not just a zero exit: `--checksig`
            # exits 0 and prints only "digests OK" for an UNSIGNED package, so trusting its summary
            # would publish unsigned packages. `-Kv` prints a "Signature ...: OK" line only when a
            # signature is present and verifies against the imported org key.
            if rpmkeys --dbpath "${rpmdb}" -Kv "${r}" 2>&1 | grep -Eqi 'signature[^:]*:[[:space:]]*OK'; then
              published=$((published+1))
            else
              echo "::warning::$(basename "${r}") is not signed by the org key -- skipping"
              rm -f "${r}"
              skipped=$((skipped+1))
            fi
          done
          echo "signature check: ${published} published, ${skipped} skipped (unsigned)"
          # Zero packages with zero skips is the legitimate bootstrap state; every downloaded
          # package failing verification is a key/secret mismatch, and deploying would replace
          # the served repository with an empty one.
          if [ "${skipped}" -gt 0 ] && [ "${published}" -eq 0 ]; then
            echo "::error::every downloaded package failed signature verification -- refusing to deploy an empty repository over the served one"
            exit 1
          fi
          echo "GNUPGHOME=${GNUPGHOME}" >> "$GITHUB_ENV"

      # Assemble the served tree + metadata. Packages are noarch, so each is placed into every
      # supported $basearch tree (x86_64, aarch64) -- a client's baseurl uses $basearch, so the
      # noarch package must resolve there. --database adds SQLite metadata some clients prefer;
      # repomd.xml is detached-signed for repo_gpgcheck=1.
      - name: Build signed repository into _site
        env:
          GPG_SIGNING_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Last consumer of the tmpfs keyring: wipe it on step exit, success or failure, so the
          # imported private key is gone before the Pages actions below run.
          trap 'rm -rf "${GNUPGHOME}"' EXIT
          # The org signing key is passphrase-protected; repomd.xml is detached-signed below with
          # the key in the tmpfs GNUPGHOME from the previous step. Keep the passphrase in the env
          # var and stream it via stdin (--passphrase-fd 0) at sign time -- never written to a file.
          [ -n "${GPG_SIGNING_PASSPHRASE}" ] || { echo "::error::GPG_SIGNING_PASSPHRASE secret not set"; exit 1; }
          mkdir -p _site   # exist even with zero packages (initial state) so the copies + index below work
          for r in $(find incoming -name '*.rpm'); do
            base="$(basename "${r}")"
            case "${base}" in
              *.el9.*)  major=9 ;;
              *.el10.*) major=10 ;;
              *) echo "::warning::${base} has no elN dist tag -- skipping"; continue ;;
            esac
            for arch in x86_64 aarch64; do
              mkdir -p "_site/el/${major}/${arch}"
              cp -f "${r}" "_site/el/${major}/${arch}/"
            done
          done
          # Generate + sign metadata for EVERY supported tree, even one with zero packages. On the
          # initial (empty) state no package-copy above created these dirs, so without this a client
          # baseurl would 404 on a missing repodata/repomd.xml; createrepo_c on an empty dir emits
          # valid (empty) metadata, and repo_gpgcheck=1 clients still need the signed repomd.xml.
          for major in 9 10; do
            for arch in x86_64 aarch64; do
              d="_site/el/${major}/${arch}"
              mkdir -p "${d}"
              createrepo_c --database "${d}"
              printf '%s' "${GPG_SIGNING_PASSPHRASE}" \
                | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
                      --detach-sign --armor "${d}/repodata/repomd.xml"
              # A zero exit alone is not proof the signature was produced; assert it validates.
              gpg --batch --verify "${d}/repodata/repomd.xml.asc" "${d}/repodata/repomd.xml"
            done
          done
          cp RPM-GPG-KEY-dag-node _site/
          cp README.md _site/ 2>/dev/null || true
          # Keep the rpm.dagnode.com custom domain bound under GitHub-Actions Pages deploys.
          echo 'rpm.dagnode.com' > _site/CNAME
          echo "served tree:"; find _site -maxdepth 4 -type d | sort

      # Utilitarian autoindex so the served tree is browsable in a browser (Pages has no directory
      # listing). dnf only requests explicit file paths, so per-directory index.html is inert to
      # clients. Regenerated from the assembled _site each run (never drifts); the empty initial
      # state still renders -- the root page shows the key + install snippet.
      - name: Generate browsable index pages
        run: python3 .github/scripts/genindex.py _site

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
